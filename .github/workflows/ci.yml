name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  javascript:
    name: Build and JS tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      # C7 going-forward gate (#54): the registry must be structurally valid AND true
      # against Hugging Face — every live capability's dataset/config/columns resolve, no
      # withheld column is surfaced. Genuine "not found" fails here; a transient HF outage
      # only warns (see scripts/verify-capabilities-online.js), so this never flakes a PR.
      - name: Validate capabilities registry (schema + live HF resolution)
        run: npm run validate:registry

      - name: Run Jest suite
        run: npm test -- --runInBand

  python:
    name: Python and docs tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build site for dist-backed tests
        run: npm run build

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Run repo-structure contract checker
        run: uv run python scripts/maintenance/verify_repo_structure.py

      - name: Run docs and Python tests
        run: uv run pytest tests/python tests/docs
