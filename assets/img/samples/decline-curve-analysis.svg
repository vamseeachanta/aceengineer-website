<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#1e2430"/>
  <!-- Title bar -->
  <rect width="800" height="48" fill="#252d3d"/>
  <text x="20" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e0e4ec">
    Production Decline Curve Analysis — Thunder Horse Field (Arps Model Fit)
  </text>
  <!-- Chart area -->
  <rect x="70" y="60" width="680" height="340" fill="#161c28" rx="4"/>
  <!-- Y-axis label -->
  <text transform="rotate(-90,18,240)" x="18" y="240" font-family="sans-serif" font-size="11" fill="#8899aa" text-anchor="middle">
    Oil Rate (BOPD)
  </text>
  <!-- Grid lines horizontal -->
  <line x1="70" y1="127" x2="750" y2="127" stroke="#2a3548" stroke-width="1"/>
  <line x1="70" y1="194" x2="750" y2="194" stroke="#2a3548" stroke-width="1"/>
  <line x1="70" y1="261" x2="750" y2="261" stroke="#2a3548" stroke-width="1"/>
  <line x1="70" y1="328" x2="750" y2="328" stroke="#2a3548" stroke-width="1"/>
  <!-- Y-axis labels -->
  <text x="62" y="131" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="end">80k</text>
  <text x="62" y="198" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="end">60k</text>
  <text x="62" y="265" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="end">40k</text>
  <text x="62" y="332" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="end">20k</text>
  <!-- Grid lines vertical -->
  <line x1="206" y1="60" x2="206" y2="400" stroke="#2a3548" stroke-width="1"/>
  <line x1="342" y1="60" x2="342" y2="400" stroke="#2a3548" stroke-width="1"/>
  <line x1="478" y1="60" x2="478" y2="400" stroke="#2a3548" stroke-width="1"/>
  <line x1="614" y1="60" x2="614" y2="400" stroke="#2a3548" stroke-width="1"/>
  <!-- X-axis labels -->
  <text x="70" y="418" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="middle">2005</text>
  <text x="206" y="418" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="middle">2008</text>
  <text x="342" y="418" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="middle">2011</text>
  <text x="478" y="418" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="middle">2014</text>
  <text x="614" y="418" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="middle">2017</text>
  <text x="750" y="418" font-family="sans-serif" font-size="10" fill="#8899aa" text-anchor="middle">2020</text>
  <!-- Actual production data points (circles) -->
  <circle cx="90" cy="90" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="130" cy="105" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="165" cy="118" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="200" cy="132" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="240" cy="155" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="280" cy="175" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="320" cy="198" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="360" cy="218" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="400" cy="238" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="440" cy="255" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="480" cy="270" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="520" cy="282" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="560" cy="294" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="600" cy="304" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="640" cy="313" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="680" cy="321" r="4" fill="#4e8ef7" opacity="0.9"/>
  <circle cx="720" cy="328" r="4" fill="#4e8ef7" opacity="0.9"/>
  <!-- Arps model fit curve (orange) -->
  <path d="M88,86 C110,95 140,110 170,124 C210,143 250,162 295,183 C340,204 385,224 430,242
           C475,259 515,273 555,284 C595,295 630,304 665,311 C695,317 720,322 748,328"
        fill="none" stroke="#f79c42" stroke-width="2.5"/>
  <!-- Forecast zone (dashed, lighter) -->
  <path d="M748,328 C760,332 770,336 780,339" fill="none" stroke="#f79c42" stroke-width="2"
        stroke-dasharray="5,4" opacity="0.6"/>
  <rect x="740" y="60" width="10" height="340" fill="#4e8ef7" opacity="0.06"/>
  <text x="744" y="78" font-family="sans-serif" font-size="9" fill="#556677" text-anchor="middle">FCST</text>
  <!-- Annotations -->
  <text x="94" y="82" font-family="sans-serif" font-size="10" fill="#ccd0d9">Peak: ~82k BOPD</text>
  <line x1="90" y1="90" x2="90" y2="80" stroke="#8899aa" stroke-width="1"/>
  <!-- Di annotation -->
  <text x="230" y="144" font-family="sans-serif" font-size="10" fill="#f79c42">Di = 28%/yr</text>
  <!-- Decline rate arrow -->
  <line x1="165" y1="118" x2="360" y2="218" stroke="#f79c42" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Legend -->
  <rect x="76" y="68" width="130" height="52" fill="rgba(20,30,45,0.85)" rx="4"/>
  <circle cx="90" cy="82" r="5" fill="#4e8ef7"/>
  <text x="100" y="86" font-family="sans-serif" font-size="11" fill="#ccd0d9">Actual production</text>
  <line x1="84" y1="102" x2="100" y2="102" stroke="#f79c42" stroke-width="2.5"/>
  <text x="106" y="106" font-family="sans-serif" font-size="11" fill="#ccd0d9">Arps model fit</text>
  <!-- Source note -->
  <text x="745" y="462" font-family="sans-serif" font-size="10" fill="#334455" text-anchor="end">
    Source: BSEE production data | aceengineer.com
  </text>
</svg>
