<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <rect width="800" height="480" fill="#0d1520"/>
  <!-- Title bar -->
  <rect width="800" height="48" fill="#152030"/>
  <text x="20" y="32" font-family="sans-serif" font-size="16" font-weight="bold" fill="#e0e4ec">
    Gulf of Mexico Rig Fleet — Geographic Distribution by Type
  </text>
  <!-- Ocean background -->
  <rect x="0" y="48" width="800" height="432" fill="#0a1828"/>
  <!-- Simplified Gulf coastline shape -->
  <path d="M0,200 Q80,160 140,180 Q180,195 220,170 Q260,145 300,155 Q340,165 360,185 Q380,205 400,195
           Q430,175 470,170 Q510,165 540,180 Q580,200 620,195 Q660,190 700,200 Q740,210 800,205 L800,48 L0,48 Z"
        fill="#1a3a1a" opacity="0.7"/>
  <!-- Deep water zone indicator -->
  <ellipse cx="400" cy="320" rx="280" ry="120" fill="none" stroke="#1e4060" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="400" y="450" font-family="sans-serif" font-size="11" fill="#2a6090" text-anchor="middle">Deepwater Zone (&gt;1000 ft)</text>
  <!-- Rig locations — drillships (blue diamonds) -->
  <polygon points="310,280 320,265 330,280 320,295" fill="#4e8ef7"/>
  <polygon points="370,305 380,290 390,305 380,320" fill="#4e8ef7"/>
  <polygon points="430,295 440,280 450,295 440,310" fill="#4e8ef7"/>
  <polygon points="490,310 500,295 510,310 500,325" fill="#4e8ef7"/>
  <polygon points="350,340 360,325 370,340 360,355" fill="#4e8ef7"/>
  <!-- Semi-submersibles (orange circles) -->
  <circle cx="300" cy="340" r="10" fill="#f79c42"/>
  <circle cx="415" cy="330" r="10" fill="#f79c42"/>
  <circle cx="465" cy="280" r="10" fill="#f79c42"/>
  <circle cx="530" cy="320" r="10" fill="#f79c42"/>
  <!-- Jack-ups (green triangles, shallower water) -->
  <polygon points="230,195 242,175 254,195" fill="#4ec97e"/>
  <polygon points="290,185 302,165 314,185" fill="#4ec97e"/>
  <polygon points="540,190 552,170 564,190" fill="#4ec97e"/>
  <polygon points="600,195 612,175 624,195" fill="#4ec97e"/>
  <!-- Field name labels -->
  <text x="320" y="258" font-family="sans-serif" font-size="9" fill="#aabbcc" text-anchor="middle">THUNDER HORSE</text>
  <text x="380" y="283" font-family="sans-serif" font-size="9" fill="#aabbcc" text-anchor="middle">MARS</text>
  <text x="440" y="273" font-family="sans-serif" font-size="9" fill="#aabbcc" text-anchor="middle">ATLANTIS</text>
  <text x="500" y="288" font-family="sans-serif" font-size="9" fill="#aabbcc" text-anchor="middle">NAKIKA</text>
  <text x="300" y="323" font-family="sans-serif" font-size="9" fill="#aabbcc" text-anchor="middle">URSA</text>
  <text x="415" y="313" font-family="sans-serif" font-size="9" fill="#aabbcc" text-anchor="middle">SHENZI</text>
  <!-- Legend -->
  <rect x="20" y="400" width="200" height="70" fill="rgba(20,40,60,0.85)" rx="4"/>
  <polygon points="32,420 40,408 48,420" fill="#4ec97e"/>
  <text x="55" y="422" font-family="sans-serif" font-size="11" fill="#ccd0d9">Jack-up (&lt;600 ft)</text>
  <circle cx="36" cy="438" r="7" fill="#f79c42"/>
  <text x="55" y="442" font-family="sans-serif" font-size="11" fill="#ccd0d9">Semi-sub (3000–12000 ft)</text>
  <polygon points="28,458 36,443 44,458 36,473" fill="#4e8ef7"/>
  <text x="55" y="462" font-family="sans-serif" font-size="11" fill="#ccd0d9">Drillship (6000–12000 ft)</text>
  <!-- Source note -->
  <text x="780" y="470" font-family="sans-serif" font-size="10" fill="#334455" text-anchor="end">
    Source: BSEE rig fleet data | aceengineer.com
  </text>
</svg>
